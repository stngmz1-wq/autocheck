<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Algo salió mal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A1D37 0%, #1a3a52 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .error-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: #F5A623;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #0A1D37;
            margin-bottom: 15px;
        }
        .error-message {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .error-path {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #999;
            margin-bottom: 30px;
            word-break: break-all;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #F5A623;
            color: white;
        }
        .btn-primary:hover {
            background: #E39615;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code" th:text="${status != null ? status : '⚠'}">⚠</div>
        <div class="error-title">Error</div>
        <div class="error-message" th:text="${message != null ? message : 'Algo salió mal. Por favor, intenta nuevamente.'}">
            Algo salió mal. Por favor, intenta nuevamente.
        </div>
        <div class="error-path" th:if="${path}">
            Ruta: <span th:text="${path}">-</span>
        </div>
        <div class="button-group">
            <a href="/" class="btn btn-primary">Ir al Inicio</a>
            <button onclick="history.back()" class="btn btn-secondary">Volver Atrás</button>
        </div>
    </div>
</body>
</html>
