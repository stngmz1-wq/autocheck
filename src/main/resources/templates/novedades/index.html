<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Novedades</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Poppins',sans-serif; background:#0d0d0d; color:#FFD600; margin:0; display:flex; align-items:flex-start; }
        .sidebar { width:260px; background:linear-gradient(180deg,#000 0%,#1a1a1a 100%); padding:2rem 1rem; display:flex; flex-direction:column; justify-content:space-between; min-height:100vh; box-shadow:2px 0 15px rgba(0,0,0,0.7); }
        .sidebar h3 { margin-bottom:2rem; font-size:1.2rem; text-align:center; color:#FFD600; }
        .sidebar nav ul { list-style:none; padding:0; }
        .sidebar nav ul li { margin:1rem 0; }
        .sidebar nav ul li a { text-decoration:none; color:#ccc; display:flex; align-items:center; gap:.8rem; padding:.7rem 1rem; border-radius:10px; transition:all 0.3s ease; }
        .sidebar nav ul li a:hover { background:#FFD600; color:#000; }
        .dropdown-menu-item { position:relative; }
        .dropdown-submenu { list-style:none; padding:0; margin:0; position:absolute; left:100%; top:0; background:linear-gradient(145deg,#1c1c1c,#111); border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,0.6); min-width:200px; opacity:0; visibility:hidden; transform:translateX(-10px); transition:all 0.3s ease; z-index:1000; }
        .dropdown-menu-item:hover .dropdown-submenu { opacity:1; visibility:visible; transform:translateX(0); }
        .dropdown-submenu li { margin:0; }
        .dropdown-submenu li a { padding:0.8rem 1rem; border-radius:8px; margin:0.2rem; display:flex; align-items:center; gap:0.8rem; color:#ccc; text-decoration:none; transition:all 0.3s ease; }
        .dropdown-submenu li a:hover { background:#FFD600; color:#000; }
        .dropdown-toggle::after { content:'▶'; margin-left:auto; font-size:0.8rem; transition:transform 0.3s ease; }
        .dropdown-menu-item:hover .dropdown-toggle::after { transform:rotate(90deg); }
        .notification-badge { background:#e53935; color:white; border-radius:50%; padding:0.2rem 0.5rem; font-size:0.7rem; font-weight:bold; margin-left:0.5rem; min-width:1.2rem; text-align:center; display:inline-block; }
        .logout-btn { background:#e53935; color:white; text-align:center; padding:.8rem; border-radius:10px; text-decoration:none; font-weight:600; }
        .logout-btn:hover { background:#c62828; }
        .main { flex:1; padding:2rem; margin-top:1rem; }
        .content-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
        .content-header h1 { margin:0; }
        .btn { padding:0.7rem 1.2rem; border-radius:10px; font-weight:bold; font-size:0.95rem; cursor:pointer; border:none; transition:transform 0.2s ease, box-shadow 0.2s ease; text-align:center; text-decoration:none; display:inline-block; }
        .btn-primary { background:linear-gradient(90deg,#FFD600,#FFC400); color:#000; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(255,214,0,0.3); }
        .btn-warning { background:#ff9800; color:#fff; }
        .btn-warning:hover { background:#e68900; }
        .btn-danger { background:#e53935; color:#fff; }
        .btn-danger:hover { background:#c62828; }
        .alert { padding:1rem; border-radius:10px; margin-bottom:1rem; }
        .alert-success { background:#2e7d32; color:white; }
        .alert-error { background:#c62828; color:white; }
        .table-container { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; background:#1a1a1a; border-radius:12px; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,0.6); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #333; }
        th { background:#2a2a2a; color:#FFD600; }
        tr:hover { background:#2a2a2a; }
        img { max-width:80px; max-height:80px; border-radius:8px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div>
        <h3><i class="fas fa-cogs"></i> Panel de Control</h3>
        <nav>
            <ul>
    <li><a th:href="@{/dashboard}"><i class="fas fa-chart-line"></i> Dashboard</a></li>
    <li><a th:href="@{/usuarios}"><i class="fas fa-users"></i> Usuarios</a></li>                
    <li><a th:href="@{/inventario}"><i class="fas fa-warehouse"></i> Inventario</a></li>
    <li><a th:href="@{/roles}"><i class="fas fa-user-shield"></i> Roles</a></li>                
    <li><a th:href="@{/novedades}"><i class="fas fa-exclamation-circle"></i> Novedades</a></li>
    <li class="dropdown-menu-item">
        <a th:href="@{/correo/inbox}" class="dropdown-toggle">
            <i class="fas fa-envelope"></i> Correo
            <span th:if="${unreadCount != null and unreadCount > 0}" class="notification-badge" th:text="${unreadCount}">0</span>
        </a>
        <ul class="dropdown-submenu">
            <li><a th:href="@{/correo/inbox}">
                <i class="fas fa-inbox"></i> Bandeja de entrada
                <span th:if="${unreadCount != null and unreadCount > 0}" class="notification-badge" th:text="${unreadCount}">0</span>
            </a></li>
            <li><a th:href="@{/correo/enviados}"><i class="fas fa-paper-plane"></i> Enviados</a></li>
            <li><a th:href="@{/correo/papelera}"><i class="fas fa-trash"></i> Papelera</a></li>
            <li><a th:href="@{/email/enviar}"><i class="fas fa-users"></i> Correos Masivos</a></li>
        </ul>
    </li>
</ul>

        </nav>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
    <button type="submit" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Cerrar sesión
    </button>
</form>

</aside>

<!-- Main -->
<main class="main">
    <div class="content-header">
        <h1>Gestión de Novedades</h1>
        <a th:href="@{/novedades/crear}" class="btn btn-primary"><i class="fas fa-plus"></i> Nueva Novedad</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Evidencia</th>
                    <th>Estado</th>
                    <th>Usuario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="novedad : ${novedades}">
                    <td th:text="${novedad.idNovedades}"></td>
                    <td th:text="${novedad.tipoNovedad}"></td>
                    <td th:text="${novedad.descripcion}"></td>
                    <td>
                        <img th:if="${novedad.evidencia != null}" th:src="@{'/uploads/' + ${novedad.evidencia}}" alt="Evidencia">
                        <span th:if="${novedad.evidencia == null}" style="color:#888;">Sin imagen</span>
                    </td>
                    <td th:text="${novedad.estado}"></td>
                    <td th:text="${novedad.usuario?.nombre}"></td>
                    <td>
                        <a th:href="@{'/novedades/editar/' + ${novedad.idNovedades}}" class="btn btn-warning">Editar</a>
                        <a th:href="@{'/novedades/eliminar/' + ${novedad.idNovedades}}" class="btn btn-danger"
                           onclick="return confirm('¿Estás seguro de eliminar esta novedad?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
