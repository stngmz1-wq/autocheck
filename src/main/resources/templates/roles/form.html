<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${rol.idRol != null ? 'Editar Rol' : 'Crear Rol'}"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-theme.css}">
    <link rel="stylesheet" th:href="@{/css/inventario.css}">
    <link rel="stylesheet" th:href="@{/css/reporte-inventario.css}">
    
  
</head>
<body>



<!-- ================= SIDEBAR ================= -->
<aside class="sidebar collapsed" id="sidebar">

<div>

<!-- HEADER SIDEBAR -->
<div class="sidebar-header">

<button id="toggleSidebar" class="toggle-btn">
<i class="fas fa-bars"></i>
</button>

<h3>
<span>Admin Panel</span>
</h3>

</div>

<!-- NAV -->
<nav>
<ul>

<li>
<a th:href="@{/dashboard}">
<i class="fas fa-chart-line"></i>
<span>Dashboard</span>
</a>
</li>

<li>
<a th:href="@{/usuarios}">
<i class="fas fa-users"></i>
<span>Usuarios</span>
</a>
</li>

<li>
<a th:href="@{/vehiculos}">
<i class="fas fa-car"></i>
<span>Vehículos</span>
</a>
</li>

<li>
<a th:href="@{/inventario}">
<i class="fas fa-warehouse"></i>
<span>Inventario</span>
</a>
</li>

<li>
<a th:href="@{/roles}">
<i class="fas fa-id-badge"></i>
<span>Roles</span>
</a>
</li>

<li>
<a th:href="@{/transporte}">
<i class="fas fa-shipping-fast"></i>
<span>Transporte</span>
</a>
</li>

<!-- CORREO DROPDOWN -->
<li class="dropdown-menu-item">

<a th:href="@{/correo/inbox}" class="dropdown-toggle">
<i class="fas fa-envelope"></i>
<span>Correo</span>

<span th:if="${unreadCount != null and unreadCount > 0}"
class="notification-badge"
th:text="${unreadCount}">
0
</span>

</a>

<ul class="dropdown-submenu">

<li>
<a th:href="@{/correo/inbox}">
<i class="fas fa-inbox"></i> Bandeja de entrada
</a>
</li>

<li>
<a th:href="@{/correo/enviados}">
<i class="fas fa-paper-plane"></i> Enviados
</a>
</li>

<li>
<a th:href="@{/correo/papelera}">
<i class="fas fa-trash"></i> Papelera
</a>
</li>

<li>
<a th:href="@{/email/enviar}">
<i class="fas fa-users"></i> Correos Masivos
</a>
</li>

</ul>
</li>

</ul>
</nav>

</div>

<!-- LOGOUT -->
<form th:action="@{/logout}" method="post">
<button type="submit" class="logout-btn">
<i class="fas fa-sign-out-alt"></i>
<span>Cerrar sesión</span>
</button>
</form>

</aside>


<!-- Main -->
<main class="main">
    <div class="form-container">
        <h1 th:text="${rol.idRol != null ? 'Editar Rol' : 'Crear Rol'}"></h1>

        <form th:action="@{${rol.idRol != null ? '/roles/actualizar/' + rol.idRol : '/roles/guardar'}}"
              method="post" th:object="${rol}">

            <div class="form-group">
                <label for="nombre"><i class="fas fa-user-shield"></i> Nombre del Rol</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                <a th:href="@{/roles}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancelar</a>
            </div>
        </form>
    </div>
</main>
<!-- ================= SCRIPT ================= -->
<script>

const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleSidebar");

let lockedOpen=false;

toggleBtn.onclick=()=>{
lockedOpen=!lockedOpen;
sidebar.classList.toggle("collapsed",!lockedOpen);
sidebar.classList.toggle("expanded",lockedOpen);
};

sidebar.onmouseenter=()=>{
if(!lockedOpen) sidebar.classList.replace("collapsed","expanded");
};

sidebar.onmouseleave=()=>{
if(!lockedOpen) sidebar.classList.replace("expanded","collapsed");
};

function mostrarNombreArchivo(input){
const fileName=document.getElementById('fileName');
fileName.textContent=
input.files.length
? "📄 "+input.files[0].name
: "";
}

</script>


</body>
</html>
