<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Formulario Vehículo — Gerente</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/manager-theme.css}"/>
  <link rel="stylesheet" th:href="@{/css/gerente-panel.css}"/>
</head>
<body>

  <aside th:replace="~{fragments/gerente-sidebar :: sidebar}"></aside>

  <main class="main">
    <div class="content-header">
      <h1><i class="fa-solid fa-car"></i>
        <span th:text="${vehiculo.idVehiculo != null ? 'Editar Vehículo' : 'Nuevo Vehículo'}">Vehículo</span>
      </h1>
      <p>Completa la información del vehículo</p>
    </div>

    <div class="card card-medium">
      <form th:action="${vehiculo.idVehiculo != null
            ? '/gerente/vehiculos/editar/' + vehiculo.idVehiculo
            : '/gerente/vehiculos/crear'}"
            th:object="${vehiculo}" method="post"
            enctype="multipart/form-data">

        <div class="form-grid">

          <div>
            <label>Marca</label>
            <input th:field="*{marca}" type="text" placeholder="Ej: Toyota" required
                   class="field-control"/>
          </div>
          <div>
            <label>Modelo</label>
            <input th:field="*{modelo}" type="text" placeholder="Ej: Corolla"
                   class="field-control"/>
          </div>
          <div>
            <label>Año</label>
            <input th:field="*{anio}" type="number" placeholder="Ej: 2024" min="1990" max="2030"
                   class="field-control"/>
          </div>
          <div>
            <label>Precio (USD)</label>
            <input th:field="*{precio}" type="number" step="0.01" placeholder="Ej: 25000.00"
                   class="field-control"/>
          </div>
          <div>
            <label>Cilindrada</label>
            <input th:field="*{cilindrada}" type="text" placeholder="Ej: 2.0L"
                   class="field-control"/>
          </div>
          <div>
            <label>Tipo de Combustible</label>
            <select th:field="*{tipoCombustible}"
                    class="field-control">
              <option value="">-- Seleccionar --</option>
              <option value="Gasolina">Gasolina</option>
              <option value="Diésel">Diésel</option>
              <option value="Eléctrico">Eléctrico</option>
              <option value="Híbrido">Híbrido</option>
              <option value="GLP">GLP</option>
            </select>
          </div>
          <div>
            <label>Transmisión</label>
            <select th:field="*{transmision}"
                    class="field-control">
              <option value="">-- Seleccionar --</option>
              <option value="Manual">Manual</option>
              <option value="Automática">Automática</option>
              <option value="CVT">CVT</option>
              <option value="Doble embrague">Doble embrague</option>
            </select>
          </div>
          <div>
            <label>Chasis (VIN)</label>
            <input th:field="*{chasis}" type="text" placeholder="Número de chasis VIN"
                   class="field-control"/>
          </div>

          <div class="col-span-full">
            <label>Descripción</label>
            <textarea th:field="*{descripcion}" rows="3" placeholder="Describe las características del vehículo..."
                      class="field-control field-textarea"></textarea>
          </div>

          <div class="col-span-full">
            <label>Imagen del Vehículo</label>
            <input type="file" name="imagenFile" accept="image/*"
                   class="field-control"/>
            <small class="empty-note">Formatos: JPG, PNG, WEBP. Máx. 5MB</small>
          </div>

        </div>

        <div class="action-buttons top-space">
          <button type="submit" class="btn">
            <i class="fa-solid fa-floppy-disk"></i> Guardar Vehículo
          </button>
          <a th:href="@{/gerente/vehiculos}" class="btn ghost">
            <i class="fa-solid fa-arrow-left"></i> Cancelar
          </a>
        </div>

      </form>
    </div>
  </main>
</body>
</html>
