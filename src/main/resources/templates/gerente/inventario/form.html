<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Formulario Inventario — Gerente</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/manager-theme.css}"/>
  <link rel="stylesheet" th:href="@{/css/gerente-panel.css}"/>
</head>
<body>

  <aside th:replace="~{fragments/gerente-sidebar :: sidebar}"></aside>

  <main class="main inventory-modern">
    <div class="content-header modern-header">
      <h1><i class="fa-solid fa-boxes-packing"></i>
        <span th:text="${inventario.idInventario != null ? 'Editar Registro' : 'Nuevo Registro'}">Inventario</span>
      </h1>
      <p>Completa los datos del vehículo en inventario</p>
      <div class="info-pills">
        <span class="info-pill"><i class="fa-solid fa-shield"></i> Registro seguro</span>
        <span class="info-pill"><i class="fa-solid fa-bolt"></i> Sincroniza catálogo</span>
      </div>
    </div>

    <div class="card card-narrow centered-panel elevated-form-card">
      <form th:action="${inventario.idInventario != null
            ? (esAdmin ? '/admin/inventario/editar/' + inventario.idInventario : '/gerente/inventario/editar/' + inventario.idInventario)
            : (esAdmin ? '/admin/inventario/crear' : '/gerente/inventario/crear')}"
            th:object="${inventario}" method="post">

        <div class="section-title compact-title">
          <h2><i class="fa-solid fa-clipboard-list"></i> Datos del vehículo</h2>
        </div>

        <div class="form-grid">

          <div>
            <label for="chasis">Chasis</label>
            <input id="chasis" th:field="*{chasis}" type="text" placeholder="Número de chasis" required
                   class="field-control"/>
          </div>
          <div>
            <label for="marca">Marca</label>
            <input id="marca" th:field="*{marca}" type="text" placeholder="Ej: Toyota" required
                   class="field-control"/>
          </div>
          <div>
            <label for="modelo">Modelo</label>
            <input id="modelo" th:field="*{modelo}" type="text" placeholder="Ej: Corolla"
                   class="field-control"/>
          </div>
          <div>
            <label for="anio">Año</label>
            <input id="anio" th:field="*{anio}" type="number" placeholder="Ej: 2024" min="1990" max="2030"
                   class="field-control"/>
          </div>
          <div>
            <label for="color">Color</label>
            <input id="color" th:field="*{color}" type="text" placeholder="Ej: Blanco"
                   class="field-control"/>
          </div>
          <div>
            <label for="motor">Motor</label>
            <input id="motor" th:field="*{motor}" type="text" placeholder="Ej: 2.0L"
                   class="field-control"/>
          </div>
          <div>
            <label for="ubicacionActual">Ubicación</label>
            <input id="ubicacionActual" th:field="*{ubicacionActual}" type="text" placeholder="Ej: Bodega Central"
                   class="field-control"/>
          </div>
          <div>
            <label for="estadoLogistico">Estado Logístico</label>
            <select id="estadoLogistico" th:field="*{estadoLogistico}"
                    class="field-control">
              <option value="">-- Seleccionar --</option>
              <option value="En bodega">En bodega</option>
              <option value="En tránsito">En tránsito</option>
              <option value="En exhibición">En exhibición</option>
              <option value="Vendido">Vendido</option>
              <option value="En mantenimiento">En mantenimiento</option>
            </select>
          </div>

        </div>

        <div class="action-buttons top-space centered-actions premium-actions">
          <button type="submit" class="btn">
            <i class="fa-solid fa-floppy-disk"></i> Guardar
          </button>
          <a th:href="${esAdmin ? '/admin/inventario' : '/gerente/inventario'}" class="btn ghost">
            <i class="fa-solid fa-arrow-left"></i> Cancelar
          </a>
        </div>

      </form>
    </div>
  </main>
</body>
</html>
