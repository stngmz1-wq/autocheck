<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">

    <!-- LOGO -->
    <div class="login-logo">
      <img src="images/AUTOCHECKLIST (5).png" alt="Logo empresa">
    </div>

    <h2>Iniciar Sesión</h2>

    <div th:if="${param.error}" class="error">
      Usuario o contraseña incorrectos.
    </div>

    <div th:if="${param.logout}" class="success">
      Has cerrado sesión correctamente.
    </div>

    <form th:action="@{/login}" method="post">

      <label for="username">Usuario</label>
      <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" id="username" name="username" placeholder="correo@ejemplo.com" required>
      </div>

      <label for="password">Contraseña</label>
      <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <div class="links">
      <a th:href="@{/registro}">Crear usuario</a>
      <a th:href="@{/recuperar}">Olvidé mi contraseña</a>
    </div>

    <div class="footer">
      © 2026 AutoCheckList. 
      <br>Todos los derechos reservados.
    </div>

    <form th:action="@{/}" method="get">
      <button type="submit" class="btn-back">Volver al inicio</button>
    </form>

  </div>
</body>
</html>
