<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-theme.css">

 
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar collapsed" id="sidebar"
       onmouseenter="openSidebar()"
       onmouseleave="closeSidebar()">
    <div>
        <div class="sidebar-header">
            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <span class="logo-text">Admin Panel</span>
        </div>
        <nav>
            <ul>
                <li>
                    <a th:href="@{/dashboard}">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/usuarios}">
                        <i class="fas fa-users"></i>
                        <span>Usuarios</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/vehiculos}">
                        <i class="fas fa-car"></i>
                        <span>Vehículos</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/inventario}">
                        <i class="fas fa-warehouse"></i>
                        <span>Inventario</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/roles}">
                        <i class="fas fa-id-badge"></i>
                        <span>Roles</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="logout">
        <form th:action="@{/logout}" method="post">
            <button type="submit">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar sesión</span>
            </button>
        </form>
    </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main">
    <div class="topbar">
        <div>
            <h1>Editar Usuario</h1>
            <span>Actualizar información del usuario</span>
        </div>
    </div>

    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-user-edit"></i>
            <h1 th:text="'Editar: ' + ${usuario.nombre}">Editar Usuario</h1>
        </div>

        <form th:action="@{/usuarios/actualizar}" method="post" th:object="${usuario}">
            <input type="hidden" th:field="*{idUsuario}"/>

            <div class="form-group">
                <label for="nombre">
                    <i class="fas fa-user"></i> Nombre
                </label>
                <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Nombre completo">
            </div>

            <div class="form-group">
                <label for="correo">
                    <i class="fas fa-envelope"></i> Correo Electrónico
                </label>
                <input type="email" id="correo" th:field="*{correo}" required placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="contrasena">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input type="password" id="contrasena" th:field="*{contrasena}" placeholder="Dejar en blanco para mantener la actual">
                <small>Deja en blanco para mantener la contraseña actual</small>
            </div>

            <div class="form-group">
                <label for="rol">
                    <i class="fas fa-user-shield"></i> Rol
                </label>
                <select id="rol" th:field="*{rol.idRol}" required>
                    <option th:each="rol : ${roles}" 
                            th:value="${rol.idRol}" 
                            th:text="${rol.nombre}"
                            th:selected="${usuario.rol != null and usuario.rol.idRol == rol.idRol}">
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-create">
                    <i class="fas fa-save"></i> Actualizar Usuario
                </button>
                <a th:href="@{/usuarios}" class="btn btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</main>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.body.classList.toggle("sidebar-collapsed");
}

function openSidebar() {
    document.getElementById("sidebar").classList.remove("collapsed");
    document.body.classList.remove("sidebar-collapsed");
}

function closeSidebar() {
    document.getElementById("sidebar").classList.add("collapsed");
    document.body.classList.add("sidebar-collapsed");
}

// Inicializar
document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById("sidebar").classList.contains("collapsed")) {
        document.body.classList.add("sidebar-collapsed");
    }
});
</script>

</body>
</html>
