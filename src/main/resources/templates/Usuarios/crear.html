<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-theme.css">

    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-header i {
            font-size: 28px;
            color: #667eea;
        }

        .form-header h1 {
            margin: 0;
            color: #333;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group label i {
            color: #667eea;
            font-size: 16px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            text-align: center;
        }

        .btn-create {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar collapsed" id="sidebar"
       onmouseenter="openSidebar()"
       onmouseleave="closeSidebar()">
    <div>
        <div class="sidebar-header">
            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <span class="logo-text">Admin Panel</span>
        </div>
        <nav>
            <ul>
                <li>
                    <a th:href="@{/dashboard}">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/usuarios}">
                        <i class="fas fa-users"></i>
                        <span>Usuarios</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/vehiculos}">
                        <i class="fas fa-car"></i>
                        <span>Vehículos</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/inventario}">
                        <i class="fas fa-warehouse"></i>
                        <span>Inventario</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/roles}">
                        <i class="fas fa-id-badge"></i>
                        <span>Roles</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="logout">
        <form th:action="@{/logout}" method="post">
            <button type="submit">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar sesión</span>
            </button>
        </form>
    </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main">
    <div class="topbar">
        <div>
            <h1>Crear Nuevo Usuario</h1>
            <span>Agregar un usuario al sistema</span>
        </div>
    </div>

    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-user-plus"></i>
            <h1>Nuevo Usuario</h1>
        </div>

        <form th:action="@{/usuarios/guardar}" method="post" th:object="${usuario}">
            <div class="form-group">
                <label for="nombre">
                    <i class="fas fa-user"></i> Nombre
                </label>
                <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Nombre completo">
            </div>

            <div class="form-group">
                <label for="correo">
                    <i class="fas fa-envelope"></i> Correo Electrónico
                </label>
                <input type="email" id="correo" th:field="*{correo}" required placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="contrasena">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input type="password" id="contrasena" th:field="*{contrasena}" required placeholder="Ingresa una contraseña segura">
            </div>

            <div class="form-group">
                <label for="rol">
                    <i class="fas fa-user-shield"></i> Rol
                </label>
                <select id="rol" th:field="*{rol.idRol}" required>
                    <option value="">-- Seleccione un rol --</option>
                    <option th:each="rol : ${roles}" th:value="${rol.idRol}" th:text="${rol.nombre}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-create">
                    <i class="fas fa-save"></i> Crear Usuario
                </button>
                <a th:href="@{/usuarios}" class="btn btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</main>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.body.classList.toggle("sidebar-collapsed");
}

function openSidebar() {
    document.getElementById("sidebar").classList.remove("collapsed");
    document.body.classList.remove("sidebar-collapsed");
}

function closeSidebar() {
    document.getElementById("sidebar").classList.add("collapsed");
    document.body.classList.add("sidebar-collapsed");
}

// Inicializar
document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById("sidebar").classList.contains("collapsed")) {
        document.body.classList.add("sidebar-collapsed");
    }
});
</script>

</body>
</html>
